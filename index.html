<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #010103; font-family: sans-serif; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 1; }
        .network-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 15; padding: 35px; border-radius: 24px; background: rgba(5, 5, 10, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 75, 0, 0.2); box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9); width: 440px; }
        .network-panel h2 { color: #fff; font-size: 1.6rem; margin-bottom: 20px; letter-spacing: 3px; font-weight: 900; text-align: center; background: linear-gradient(135deg, #fff, #ff6a00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(0, 0, 0, 0.5); color: #fff; font-family: monospace; font-size: 1rem; outline: none; }
        .btn { display: block; width: 100%; color: #fff; background: linear-gradient(135deg, #ff2a00, #ff6a00); padding: 14px; font-weight: 800; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 20px; }
        .terminal-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { padding: 8px 16px; font-size: 0.75rem; font-weight: 700; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); color: #555; cursor: pointer; }
        .tab-btn.active[data-type="cmd"] { background: #050508; color: #00ff66; border-color: rgba(0, 255, 102, 0.3); }
        .tab-btn.active[data-type="ps"] { background: #011530; color: #00bfff; border-color: rgba(0, 191, 255, 0.3); }
        .cmd-terminal { border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; text-align: left; }
        .cmd-terminal.theme-cmd { background: #050508; color: #00ff66; }
        .cmd-terminal.theme-ps { background: #011530; color: #ffffff; }
        .cmd-terminal .err { color: #ff3344; }
        .cmd-terminal .info { color: #ffaa00; }
    </style>
</head>
<body>

    <div class="network-panel" id="mainPanel">
        <h2>@phrazel</h2>
        <div class="input-group">
            <input type="text" id="target-target" value="1.1.1.1" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn" onclick="startExecutionPing()">Run Diagnosis</button>
        <div class="terminal-tabs">
            <button class="tab-btn active" data-type="cmd" onclick="setTerminalTheme('cmd')">cmd.exe</button>
            <button class="tab-btn" data-type="ps" onclick="setTerminalTheme('ps')">PowerShell</button>
        </div>
