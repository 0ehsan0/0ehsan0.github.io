<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity | @phrazel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #020205;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            perspective: 1000px;
        }
        /* Ш§ЩҒЪ©ШӘ ЩҶЩҲЫҢШІ ШӘЫҢШұЩҮ ШұЩҲЫҢ Ъ©Щ„ ЩҒШ¶Ш§ */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* ШЁШ§Ъ©Ші ЩҮШіШӘЩҮ Щ…ШұЪ©ШІЫҢ ШҜШ§Ш®Щ„ ШіЫҢШ§ЩҮвҖҢЪҶШ§Щ„ЩҮ */
        .singularity-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            padding: 40px;
            border-radius: 50%;
            width: 280px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Ш§ЩҒЪ©ШӘ ШҙЫҢШҙЩҮ Щ…Ш§ШӘ ШҜШұ Ш§ЩҒЩӮ ШұЩҲЫҢШҜШ§ШҜ ШіЫҢШ§ЩҮвҖҢЪҶШ§Щ„ЩҮ */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 0, 0.15);
            box-shadow: 0 0 40px rgba(0, 0, 0, 1), inset 0 0 30px rgba(0, 255, 0, 0.05);
            transition: all 0.5s ease;
        }
        h1 {
            font-size: 2.2rem;
            color: #00ff00;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            font-weight: 900;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff00;
            padding: 12px 25px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 20px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 25px #00ff00, 0 0 50px rgba(0, 255, 0, 0.3);
            transform: scale(1.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ШЁЩҲЩ… ШҙШЁЫҢЩҮвҖҢШіШ§ШІ Ш¬Ш§Ш°ШЁЩҮ ШіЫҢШ§ЩҮвҖҢЪҶШ§Щ„ЩҮ -->
    <canvas id="blackholeCanvas"></canvas>

    <!-- ЩҮШіШӘЩҮ Ш«Ш§ШЁШӘ Щ…ШұЪ©ШІЫҢ -->
    <div class="singularity-core">
        <h1>@phrazel</h1>
        <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
    </div>

    <script>
        const canvas = document.getElementById('blackholeCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let centerX = width / 2;
        let centerY = height / 2;

        const particleCount = 400; // ШӘШ№ШҜШ§ШҜ Ш°ШұШ§ШӘ Ъ©ШҜЫҢ
        const particles = [];
        const chars = ['0', '1', 'Гҳ', 'X', 'F', 'A', '7', '9', ' ', 'вҖў'];

        class Particle {
            constructor() {
                this.reset();
                // ШӘЩҲШІЫҢШ№ ШұЩҶШҜЩҲЩ… Ш§ЩҲЩ„ЫҢЩҮ ШҜШұ ШіШұШ§ШіШұ ШөЩҒШӯЩҮ
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * (Math.max(width, height) / 2);
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                // ШҙШұЩҲШ№ Ш§ШІ Щ„ШЁЩҮвҖҢЩҮШ§ЫҢ ШЁЫҢШұЩҲЩҶЫҢ ШөЩҒШӯЩҮ
                this.radius = Math.max(width, height) / 2 + Math.random() * 100;
                this.speed = 0.5 + Math.random() * 1.5; // ШіШұШ№ШӘ ШӯШұЪ©ШӘ ШЁЩҮ ШіЩ…ШӘ Щ…ШұЪ©ШІ
                this.rotationSpeed = 0.01 + Math.random() * 0.02; // ШіШұШ№ШӘ ЪҶШұШ®Шҙ ШҜШ§ЫҢШұЩҮвҖҢШ§ЫҢ
                this.char = chars[Math.floor(Math.random() * chars.length)];
                this.colorOpacity = 0.1;
                this.fontSize = 10 + Math.random() * 8;
            }

            update() {
                // Ъ©ШҙЫҢШҜЩҮ ШҙШҜЩҶ ШЁЩҮ ШіЩ…ШӘ ЩҮШіШӘЩҮ Щ…ШұЪ©ШІЫҢ (Ъ©Ш§ЩҮШҙ ШҙШ№Ш§Ш№)
                this.radius -= this.speed;
                // ЪҶШұШ®Шҙ ШЁЩҮ ШҜЩҲШұ Щ…ШұЪ©ШІ
                this.angle += this.rotationSpeed;

                // ШҜШұШ®ШҙШҙ ШЁЫҢШҙШӘШұ ШЁШ§ ЩҶШІШҜЫҢЪ©вҖҢШӘШұ ШҙШҜЩҶ ШЁЩҮ Ш§ЩҒЩӮ ШұЩҲЫҢШҜШ§ШҜ ШіЫҢШ§ЩҮвҖҢЪҶШ§Щ„ЩҮ
                if (this.radius < 300 && this.radius > 140) {
                    this.colorOpacity = (300 - this.radius) / 160;
                } else if (this.radius >= 300) {
                    this.colorOpacity = 0.15;
                }

                // Ш§ЪҜШұ Ш°ШұЩҮ ШЁЩ„Ш№ЫҢШҜЩҮ ШҙШҜ ЩҲ ШЁЩҮ Щ…ШұЪ©ШІ Щ…Ш·Щ„ЩӮ ШұШіЫҢШҜШҢ ШҜЩҲШЁШ§ШұЩҮ Ш§ШІ ШЁЫҢШұЩҲЩҶ Щ…ШӘЩҲЩ„ШҜ ШҙЩҲШҜ
                if (this.radius <= 135) {
                    this.reset();
                }
            }

            draw() {
                // Щ…ШӯШ§ШіШЁЩҮ Щ…ЩҲЩӮШ№ЫҢШӘ Ъ©Ш§ШұШӘШІЫҢЩҶЫҢ Ш§ШІ ШұЩҲЫҢ ШІШ§ЩҲЫҢЩҮ ЩҲ ШҙШ№Ш§Ш№
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius;

                ctx.font = `${this.fontSize}px monospace`;
                ctx.fillStyle = `rgba(0, 255, 0, ${this.colorOpacity})`;
                ctx.fillText(this.char, x, y);
            }
        }

        // ШіШ§Ш®ШӘ Ш°ШұШ§ШӘ Ш§ЩҲЩ„ЫҢЩҮ
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Ш§ЩҶЫҢЩ…ЫҢШҙЩҶ ЩҒШұЫҢЩ…вҖҢЩҮШ§
        const animate = () => {
            // Ш§ЩҒЪ©ШӘ ШҜЩҶШЁШ§Щ„ЩҮвҖҢШҜШ§Шұ ШҙШҜЩҶ Ш°ШұШ§ШӘ Щ…Ш§ШӘШұЫҢЪ©ШіЫҢ ШЁШ§ Щ„Ш§ЫҢЩҮ ШӘЫҢШұЩҮ Щ…Ш§ШӘ
            ctx.fillStyle = 'rgba(2, 2, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // Ш§ЫҢШ¬Ш§ШҜ ЩҮШ§Щ„ЩҮ ЩҶЩҲШұЫҢ ШЁШіЫҢШ§Шұ Ш¶Ш№ЫҢЩҒ ШҜШұ Ш§ЩҒЩӮ ШіЫҢШ§ЩҮвҖҢЪҶШ§Щ„ЩҮ
            const gradient = ctx.createRadialGradient(centerX, centerY, 135, centerX, centerY, 200);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
            gradient.addColorStop(0.5, 'rgba(0, 255, 0, 0.03)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 200, 0, Math.PI * 2);
            ctx.fill();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        };

        // ЩҮЩ…Ш§ЩҮЩҶЪҜЫҢ ШЁШ§ ШӘШәЫҢЫҢШұ ШіШ§ЫҢШІ Щ…ШұЩҲШұЪҜШұ ЫҢШ§ ЪҶШұШ®Шҙ ЪҜЩҲШҙЫҢ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        });

        // ШӘШ§Ш«ЫҢШұ ШӯШұЪ©ШӘ Щ…ЩҲШі ШұЩҲЫҢ Щ…ШұЪ©ШІ Ш«ЩӮЩ„ ШіЫҢШ§ЩҮвҖҢЪҶШ§Щ„ЩҮ
        window.addEventListener('mousemove', (e) => {
            // Ш§ЩҶШӯШұШ§ЩҒ ШЁШіЫҢШ§Шұ Ш¬ШІЫҢЫҢ Щ…ШұЪ©ШІ Ш¬Ш§Ш°ШЁЩҮ ШЁЩҮ ШіЩ…ШӘ Щ…ЩҲШі ШЁШұШ§ЫҢ ШІЩҶШҜЩҮ ШҙШҜЩҶ ШөЩҒШӯЩҮ
            centerX = (width / 2) + (e.clientX - width / 2) * 0.05;
            centerY = (height / 2) + (e.clientY - height / 2) * 0.05;
            
            const core = document.querySelector('.singularity-core');
            if(core) {
                core.style.left = `${centerX}px`;
                core.style.top = `${centerY}px`;
            }
        });

        animate();
    </script>
</body>
</html>
