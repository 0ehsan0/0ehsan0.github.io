<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Advanced Core Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030307;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }

        /* 🌌 پنل شیشه‌ای فوق مدرن و سه‌بعدی متحرک */
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 40px; 
            border-radius: 28px;
            background: rgba(6, 6, 11, 0.45);
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 75, 0, 0.18);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 0 30px rgba(255, 75, 0, 0.03);
            width: 460px;
            transition: border-color 0.4s ease;
        }
        
        .network-panel h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            letter-spacing: 4px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* کادر ورودی با استایل نئون مخفی */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .input-group input:focus {
            border-color: rgba(255, 75, 0, 0.6);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 25px rgba(255, 75, 0, 0.15), inset 0 2px 4px rgba(0,0,0,0.5);
        }

        /* دکمه اکشن شیک دارک هولوگرافیک */
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff2a00, #ff6a00);
            padding: 16px; 
            font-weight: 800; 
            font-size: 0.95rem;
            border-radius: 16px; 
            letter-spacing: 2px; 
            border: none;
            cursor: pointer;
            margin-bottom: 25px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 25px rgba(255, 42, 0, 0.25);
        }
        .btn:hover { 
            box-shadow: 0 0 40px rgba(255, 106, 0, 0.6);
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }

        /* تب‌های مدرن و مینیمال ترمینال */
        .terminal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            padding-left: 4px;
        }

            padding: 8px 18px;
            font-size: 0.75rem;
            font-weight: 700;
