<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلودر مستقل تیک‌تاک</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff0050;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #e60045; }
        .result { margin-top: 25px; display: none; }
        .download-btn {
            display: inline-block;
            background-color: #00b5ff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>دانلود ویدیو از تیک‌تاک</h2>
    <p>لینک ویدیو را وارد کنید:</p>
    <input type="text" id="tiktokUrl" placeholder="https://www.tiktok.com/@...">
    <button onclick="processVideo()">دریافت لینک دانلود</button>

    <div id="loading" style="display:none; margin-top:15px;">در حال پردازش و استخراج از SnapTik...</div>

    <div id="result" class="result">
        <h3 id="videoTitle">ویدیو آماده دانلود است</h3>
        <a id="videoLink" class="download-btn" target="_blank" download>دانلود ویدیو (بدون واترمارک)</a>
    </div>
</div>

<script>
async function processVideo() {
    const url = document.getElementById('tiktokUrl').value;
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    
    if(!url) {
        alert('لطفاً ابتدا لینک را وارد کنید');
        return;
    }

    loading.style.display = 'block';
    resultDiv.style.display = 'none';

    try {
        // شبیه‌سازی ارسال فرم به سایت SnapTik
        const formData = new URLSearchParams();
        formData.append('url', url);

        // استفاده از پروکسی معکوس عمومی برای دور زدن محدودیت CORS در مرورگر
        const corsProxy = 'https://cors-anywhere.herokuapp.com/'; 
        const response = await fetch(corsProxy + 'https://snaptik.cx/action', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: formData
        });

        const html = await response.text();

        // تبدیل متن HTML دریافت شده به المان‌های قابل جستجو در جاوااسکریپت
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // پیدا کردن لینک دانلود مستقیم از داخل کدهای SnapTik
        const downloadAnchor = doc.querySelector('.download-links a.btn-download') || 
                               doc.querySelector('a[href*="render"]') || 
                               doc.querySelector('a.snaptik-button');

        if (downloadAnchor) {
            let finalLink = downloadAnchor.getAttribute('href');
            if (!finalLink.startsWith('http')) {
                finalLink = 'https://snaptik.cx' + finalLink;
            }

            document.getElementById('videoLink').href = finalLink;
            loading.style.display = 'none';
            resultDiv.style.display = 'block';
        } else {
            alert('خطا: لینک دانلود در کدهای SnapTik یافت نشد. ممکن است ساختار سایت تغییر کرده باشد.');
            loading.style.display = 'none';
        }

    } catch (error) {
        console.error(error);
        alert('خطا در ارتباط با سرور واسط. مطمئن شوید دسترسی به پروکسی باز است.');
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
