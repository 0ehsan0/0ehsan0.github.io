<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuVpn  </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: #fff;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 50px;
            border-radius: 10px;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        h1 {
            font-size: 2.5rem;
            color: #00ff00;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ff00;
        }
        p {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="content">
        <h1>NeuVpn</h1>
        <p>🔒 Secure Network Configuration Channel</p>
        <a href="https://t.me/phrazel" target="_blank" class="btn">DM</a>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const alphabet = katakana.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(draw, 30);
    </script>
</body>
</html>
<button id="sednaTrigger" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0, 0, 0, 0.9); color: #ff3366; border: 1px solid #ff3366; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 0 10px rgba(255, 51, 102, 0.2); transition: all 0.3s ease; font-family: Tahoma, Arial, sans-serif;">بزن روم خانومی</button>

    <div id="sednaBox" style="position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 15; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none;">
        <div style="position: relative; width: 170px; height: 170px; background-color: #ff3366; transform: rotate(-45deg); box-shadow: 0 0 40px #ff3366, 0 0 80px #ff3366; animation: hbPulse 1.2s infinite;">
            <div style="position: absolute; width: 170px; height: 170px; background-color: #ff3366; border-radius: 50%; top: -85px; left: 0;"></div>
            <div style="position: absolute; width: 170px; height: 170px; background-color: #ff3366; border-radius: 50%; top: 0; left: 85px;"></div>
        </div>
        <div style="position: absolute; z-index: 20; color: #fff; font-size: 1.6rem; font-weight: bold; text-shadow: 0 0 10px #000; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: txtPulse 1.2s infinite; font-family: Tahoma, Arial, sans-serif; width: 200px; direction: rtl;">
            سدنا عشق احسان
            <br>
            <button id="sednaBack" style="margin-top: 35px; background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s; font-family: monospace;">Return</button>
        </div>
    </div>

    <style>
        @keyframes hbPulse {
            0%, 80%, 100% { transform: rotate(-45deg) scale(1); }
            20% { transform: rotate(-45deg) scale(1.15); }
            40% { transform: rotate(-45deg) scale(1.05); }
            60% { transform: rotate(-45deg) scale(1.2); }
        }
        @keyframes txtPulse {
            0%, 80%, 100% { transform: scale(1); }
            20% { transform: scale(1.12); }
            40% { transform: scale(1.03); }
            60% { transform: scale(1.15); }
        }
        #sednaTrigger:hover { box-shadow: 0 0 25px #ff3366; background: #ff3366; color: #000; }
        #sednaBack:hover { background: #fff; color: #000; }
    </style>

    <script>
        // کدهای جاوااسکریپت استاندارد برای مدیریت دکمه و باکس قلب
        const triggerBtn = document.getElementById('sednaTrigger');
        const sednaBox = document.getElementById('sednaBox');
        const backBtn = document.getElementById('sednaBack');
        const mainContent = document.querySelector('.content');

        if(triggerBtn) {
            triggerBtn.addEventListener('click', () => {
                if(sednaBox) {
                    sednaBox.style.transform = 'translate(-50%, -50%) scale(1)';
                    sednaBox.style.opacity = '1';
                    sednaBox.style.pointerEvents = 'auto';
                }
                triggerBtn.style.display = 'none';
                if(mainContent) {
                    mainContent.style.opacity = '0.1';
                    mainContent.style.filter = 'blur(5px)';
                    mainContent.style.pointerEvents = 'none';
                }
            });
        }

        if(backBtn) {
            backBtn.addEventListener('click', () => {
                if(sednaBox) {
                    sednaBox.style.transform = 'translate(-50%, -50%) scale(0)';
                    sednaBox.style.opacity = '0';
                    sednaBox.style.pointerEvents = 'none';
                }
                setTimeout(() => { triggerBtn.style.display = 'block'; }, 300);
                if(mainContent) {
                    mainContent.style.opacity = '1';
                    mainContent.style.filter = 'none';
                    mainContent.style.pointerEvents = 'auto';
                }
            });
        }
    </script>
